<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcane NPC Forge - D&D 5e Generator</title>
    <link rel="stylesheet" href="styles-magic.css">
</head>
<body>
    <div class="cosmic-background"></div>
    <div class="stars"></div>
    <div class="aurora"></div>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-glow"></div>
            <h1 class="title">✨ Arcane NPC Forge ✨</h1>
            <p class="subtitle">Summon legendary characters from the aether</p>
        </header>

        <!-- Main Grid -->
        <div class="grid">
            <!-- Left Panel: Controls -->
            <section class="panel control-panel">
                <h2 class="panel-title">⚡ Forge Configuration</h2>
                
                <form id="npcForm" class="form">
                    <div class="form-group">
                        <label for="name">Character Name</label>
                        <div class="input-wrapper">
                            <input type="text" id="name" placeholder="Leave blank for random destiny">
                            <div class="input-glow"></div>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="race">Race</label>
                            <div class="select-wrapper">
                                <select id="race">
                                    <option value="">✨ Random</option>
                                    <option value="human">Human</option>
                                    <option value="elf">Elf</option>
                                    <option value="dwarf">Dwarf</option>
                                    <option value="halfling">Halfling</option>
                                    <option value="dragonborn">Dragonborn</option>
                                    <option value="gnome">Gnome</option>
                                    <option value="half-elf">Half-Elf</option>
                                    <option value="half-orc">Half-Orc</option>
                                    <option value="tiefling">Tiefling</option>
                                </select>
                                <div class="select-glow"></div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="class">Class</label>
                            <div class="select-wrapper">
                                <select id="class">
                                    <option value="">✨ Random</option>
                                    <option value="barbarian">Barbarian</option>
                                    <option value="bard">Bard</option>
                                    <option value="cleric">Cleric</option>
                                    <option value="druid">Druid</option>
                                    <option value="fighter">Fighter</option>
                                    <option value="monk">Monk</option>
                                    <option value="paladin">Paladin</option>
                                    <option value="ranger">Ranger</option>
                                    <option value="rogue">Rogue</option>
                                    <option value="sorcerer">Sorcerer</option>
                                    <option value="warlock">Warlock</option>
                                    <option value="wizard">Wizard</option>
                                </select>
                                <div class="select-glow"></div>
                            </div>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="role">Archetype</label>
                            <div class="select-wrapper">
                                <select id="role">
                                    <option value="">✨ Random</option>
                                    <option value="warrior">Warrior</option>
                                    <option value="duelist">Duelist</option>
                                    <option value="archer">Archer</option>
                                    <option value="spellcaster">Spellcaster</option>
                                    <option value="healer">Healer</option>
                                    <option value="rogue">Rogue</option>
                                    <option value="tank">Tank</option>
                                    <option value="assassin">Assassin</option>
                                </select>
                                <div class="select-glow"></div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="level">Level</label>
                            <div class="select-wrapper">
                                <select id="level">
                                    <option value="">✨ Random</option>
                                    <option value="1">Level 1</option>
                                    <option value="3">Level 3</option>
                                    <option value="5">Level 5</option>
                                    <option value="8">Level 8</option>
                                    <option value="10">Level 10</option>
                                    <option value="13">Level 13</option>
                                    <option value="15">Level 15</option>
                                </select>
                                <div class="select-glow"></div>
                            </div>
                        </div>
                    </div>

                    <div class="form-group checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="isBoss">
                            <span>⚔️ Boss Encounter (enhanced power)</span>
                        </label>
                    </div>

                    <button type="submit" class="btn-generate">
                        <span class="btn-text">Forge Character</span>
                        <span class="btn-glow"></span>
                    </button>
                </form>

                <div class="divider"></div>

                <h2 class="panel-title">📜 Summon from Archive</h2>
                <div class="form-group">
                    <label for="fileUpload">Load Character JSON</label>
                    <div class="input-wrapper file-wrapper">
                        <input type="file" id="fileUpload" accept=".json">
                        <div class="input-glow"></div>
                    </div>
                </div>
            </section>

            <!-- Right Panel: Output -->
            <section class="panel output-panel">
                <div id="placeholder" class="placeholder">
                    <div class="placeholder-icon">🎲</div>
                    <h3>Ready to forge?</h3>
                    <p>Configure the arcane parameters and summon your NPC</p>
                </div>

                <div id="output" class="stat-block hidden">
                    <!-- Generated stat block appears here -->
                </div>

                <div id="outputControls" class="output-controls hidden">
                    <button id="downloadBtn" class="btn-action download-btn">
                        <span class="icon">💾</span> Download
                    </button>
                    <button id="printBtn" class="btn-action print-btn">
                        <span class="icon">🖨️</span> Print
                    </button>
                </div>
            </section>
        </div>
    </div>

    <script src="npcData.js"></script>
    <script src="generator.js"></script>
    <script src="app-fixed.js"></script>
</body>
</html>
