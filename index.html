<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D 5e SRD NPC Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <h1>NPC Grimoire</h1>
                <p>D&D 5e SRD Character Generator</p>
            </div>
        </header>

        <main class="main-grid">
            <!-- Input Panel -->
            <section class="input-panel">
                <h2>Forge Your NPC</h2>
                
                <form id="npcForm" class="form">
                    <div class="form-group">
                        <label for="name">Name (optional)</label>
                        <input type="text" id="name" placeholder="Leave blank for random">
                    </div>

                    <div class="form-group">
                        <label for="race">Race</label>
                        <select id="race">
                            <option value="">Random</option>
                            <option value="human">Human</option>
                            <option value="elf">Elf</option>
                            <option value="dwarf">Dwarf</option>
                            <option value="halfling">Halfling</option>
                            <option value="dragonborn">Dragonborn</option>
                            <option value="gnome">Gnome</option>
                            <option value="half-elf">Half-Elf</option>
                            <option value="half-orc">Half-Orc</option>
                            <option value="tiefling">Tiefling</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="class">Class</label>
                        <select id="class">
                            <option value="">Random</option>
                            <option value="barbarian">Barbarian</option>
                            <option value="bard">Bard</option>
                            <option value="cleric">Cleric</option>
                            <option value="druid">Druid</option>
                            <option value="fighter">Fighter</option>
                            <option value="monk">Monk</option>
                            <option value="paladin">Paladin</option>
                            <option value="ranger">Ranger</option>
                            <option value="rogue">Rogue</option>
                            <option value="sorcerer">Sorcerer</option>
                            <option value="warlock">Warlock</option>
                            <option value="wizard">Wizard</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="role">Role/Description</label>
                        <input type="text" id="role" placeholder="e.g., two-handed warrior, stealthy rogue, boss mage">
                    </div>

                    <div class="form-group">
                        <label for="isBoss">
                            <input type="checkbox" id="isBoss">
                            <span>Boss NPC (higher level, special abilities)</span>
                        </label>
                    </div>

                    <button type="submit" class="btn-generate">⚔️ Generate NPC</button>
                </form>
            </section>

            <!-- Output Panel -->
            <section class="output-panel">
                <div id="output" class="stat-block hidden">
                    <!-- Generated stat block will appear here -->
                </div>
                <div id="placeholder" class="placeholder">
                    <div class="dice">🎲</div>
                    <p>Fill in your preferences and roll!</p>
                </div>
            </section>
        </main>
    </div>

    <script src="npcData.js"></script>
    <script src="generator.js"></script>
    <script src="app.js"></script>
</body>
</html>
