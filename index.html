<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D 5e SRD NPC Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <h1>NPC Grimoire</h1>
                <p>D&D 5e SRD Character Generator</p>
            </div>
        </header>

        <main class="main-grid">
            <!-- Input Panel -->
            <section class="input-panel">
                <h2>Forge Your NPC</h2>
                
                <form id="npcForm" class="form">
                    <div class="form-group">
                        <label for="name">Name (optional)</label>
                        <input type="text" id="name" placeholder="Leave blank for random">
                    </div>

                    <div class="form-group">
                        <label for="race">Race</label>
                        <select id="race">
                            <option value="">Random</option>
                            <option value="human">Human</option>
                            <option value="elf">Elf</option>
                            <option value="dwarf">Dwarf</option>
                            <option value="halfling">Halfling</option>
                            <option value="dragonborn">Dragonborn</option>
                            <option value="gnome">Gnome</option>
                            <option value="half-elf">Half-Elf</option>
                            <option value="half-orc">Half-Orc</option>
                            <option value="tiefling">Tiefling</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="class">Class</label>
                        <select id="class">
                            <option value="">Random</option>
                            <option value="barbarian">Barbarian</option>
                            <option value="bard">Bard</option>
                            <option value="cleric">Cleric</option>
                            <option value="druid">Druid</option>
                            <option value="fighter">Fighter</option>
                            <option value="monk">Monk</option>
                            <option value="paladin">Paladin</option>
                            <option value="ranger">Ranger</option>
                            <option value="rogue">Rogue</option>
                            <option value="sorcerer">Sorcerer</option>
                            <option value="warlock">Warlock</option>
                            <option value="wizard">Wizard</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="role">Role/Archetype</label>
                        <select id="role">
                            <option value="">Random Archetype</option>
                            <option value="warrior">Warrior (Two-Handed Fighter)</option>
                            <option value="duelist">Duelist (Finesse Master)</option>
                            <option value="archer">Archer (Ranged Specialist)</option>
                            <option value="spellcaster">Spellcaster (Magic User)</option>
                            <option value="healer">Healer (Support Caster)</option>
                            <option value="rogue">Rogue (Stealthy Operator)</option>
                            <option value="tank">Tank (Defender)</option>
                            <option value="assassin">Assassin (Damage Dealer)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="level">Level</label>
                        <select id="level">
                            <option value="">Random Level</option>
                            <option value="1">Level 1</option>
                            <option value="2">Level 2</option>
                            <option value="3">Level 3</option>
                            <option value="4">Level 4</option>
                            <option value="5">Level 5</option>
                            <option value="6">Level 6</option>
                            <option value="7">Level 7</option>
                            <option value="8">Level 8</option>
                            <option value="9">Level 9</option>
                            <option value="10">Level 10</option>
                            <option value="11">Level 11</option>
                            <option value="12">Level 12</option>
                            <option value="13">Level 13</option>
                            <option value="14">Level 14</option>
                            <option value="15">Level 15</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="isBoss">
                            <input type="checkbox" id="isBoss">
                            <span>Boss NPC (special abilities & legendary actions)</span>
                        </label>
                    </div>

                    <button type="submit" class="btn-generate">⚔️ Generate NPC</button>
                </form>

                <hr class="form-divider">

                <h2>Character Sheet Viewer</h2>
                <div class="form-group">
                    <label for="fileUpload">Upload NPC JSON</label>
                    <input type="file" id="fileUpload" accept=".json">
                </div>
            
                </form>
            </section>

            <!-- Output Panel -->
            <section class="output-panel">
                <div class="output-controls hidden" id="outputControls">
                    <button id="downloadBtn" class="btn-action">💾 Download as JSON</button>
                    <button id="printBtn" class="btn-action">🖨️ Print</button>
                </div>
                <div id="output" class="stat-block hidden">
                    <!-- Generated stat block will appear here -->
                </div>
                <div id="placeholder" class="placeholder">
                    <div class="dice">🎲</div>
                    <p>Fill in your preferences and roll!</p>
                </div>
            </section>
        </main>
    </div>

    <script src="npcData.js"></script>
    <script src="generator.js"></script>
    <script src="app.js"></script>
</body>
</html>
